name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./WordPlay

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WordPlay/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test


  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./WordPlay/backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test backend
        run: dotnet test --no-build


  playwright:
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: WordPlay/package-lock.json

      - name: Install dependencies
        working-directory: ./WordPlay
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./WordPlay
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ./WordPlay
        run: npx playwright test tests